<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор одежды</title>
<style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:1080px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}
h1{margin:0;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);gap:22px;padding:12px 22px 22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px;min-width:0}
.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.step+.step{margin-top:18px}
.step.is-hidden{display:none}
.step h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.seg,.dim-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}
.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.btn:disabled,.sw:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none;background:#fafafa}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,52px);gap:12px}
.sw{width:52px;height:52px;border-radius:50%;border:2px solid #d7d7d7;cursor:pointer;background:var(--sw);transition:.18s ease}
.sw.white{box-shadow:inset 0 0 0 1px #d8d8d8}
.sw.transparent{background:linear-gradient(45deg,#efefef 25%,#fff 25%,#fff 50%,#efefef 50%,#efefef 75%,#fff 75%,#fff 100%);background-size:12px 12px}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.14)}
.sum{display:grid;gap:14px;min-width:0}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}
.row:last-child{border-bottom:none;padding-bottom:0}
.row strong{color:#191919}
.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}
.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
.hint{margin-top:10px;padding:10px 12px;border-radius:12px;background:#f3f8f4;font-size:13px;color:#35523f;border:1px solid #dce9df}
.err{background:#fff2f0;border-color:#efc5bf;color:#7d2d25}
.note{font-size:12px;color:#a94442;line-height:1.35;margin-top:8px}
@media (max-width:980px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
@media (max-width:560px){
  body{padding:10px 8px}
  .wrap{border-radius:22px}
  .head{padding:18px 14px 10px}
  h1{font-size:24px}
  .grid{padding:10px;gap:10px}
  .panel,.card{padding:14px;border-radius:18px}
  .seg,.dim-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .btn{min-height:46px;padding:8px;font-size:13px;border-radius:12px}
  .swatches{grid-template-columns:repeat(4,52px);gap:10px}
  .sw{width:48px;height:48px}
  .badge{font-size:12px;padding:7px 10px}
  .row,.hint{font-size:12px}
  .total{font-size:28px}
}
</style>
</head>
<body>
<section class="wrap">
  <div class="head"><h1>Калькулятор расчёта стоимости пошива одежды</h1></div>
  <div class="grid" id="app"></div>
</section>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtsC1vAfV1H3iCo1gYfRCTHqULiWlPfft_lyoqs62L_bL4zr2a7XhjRJpR3rMeUVPstw/exec';

const APP = {
  quantities:[50,100,200,300,500,1000],
  colorOrder:['white','black','blue','red','request'],
  colorMeta:{
    white:{label:'Белый',hex:'#ffffff',className:'white'},
    black:{label:'Чёрный',hex:'#111111'},
    blue:{label:'Синий',hex:'#295bc8'},
    red:{label:'Красный',hex:'#d64242'},
    request:{label:'По запросу',hex:'transparent',className:'transparent'}
  }
};

const money = v => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(Number(v || 0))) + ' руб.';
const n0 = v => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Number(v || 0));

class Calc {
  constructor(root){
    this.root = root;
    this.loaded = false;
    this.error = '';
    this.rows = [];
    this.catalog = {products:[], materialsByProduct:{}, densitiesByKey:{}, colorsByKey:{}};
    this.s = {product:'', material:'', density:null, color:'', qty:50};
    this.render();
    this.loadData();
  }

  loadJsonp(url){
    return new Promise((resolve, reject) => {
      const cb = '__clothesSewingCallback_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const sep = url.includes('?') ? '&' : '?';
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('Таймаут загрузки данных'));
      }, 20000);

      function cleanup(){
        clearTimeout(timeout);
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      }

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('Ошибка загрузки скрипта'));
      };

      script.src = url + sep + 'callback=' + encodeURIComponent(cb);
      document.body.appendChild(script);
    });
  }

  normalizeItems(items){
    return (Array.isArray(items) ? items : []).map(row => ({
      product_id: String(row.product_id || '').trim(),
      product_label: String(row.product_label || '').trim(),
      material_id: String(row.material_id || '').trim(),
      material_label: String(row.material_label || '').trim(),
      density: row.density === '' || row.density == null ? null : Number(row.density),
      color_id: String(row.color_id || '').trim(),
      color_label: String(row.color_label || '').trim(),
      unit_price: Number(row.unit_price || 0)
    })).filter(row =>
      row.product_id && row.material_id && row.color_id && row.unit_price > 0
    );
  }

  buildCatalog(rows){
    const productsMap = new Map();
    const materialsByProduct = {};
    const densitiesByKey = {};
    const colorsByKey = {};

    rows.forEach(row => {
      if (!productsMap.has(row.product_id)) {
        productsMap.set(row.product_id, {id: row.product_id, label: row.product_label || row.product_id});
      }

      if (!materialsByProduct[row.product_id]) materialsByProduct[row.product_id] = new Map();
      if (!materialsByProduct[row.product_id].has(row.material_id)) {
        materialsByProduct[row.product_id].set(row.material_id, {id: row.material_id, label: row.material_label || row.material_id});
      }

      const densKey = row.product_id + '|' + row.material_id;
      if (!densitiesByKey[densKey]) densitiesByKey[densKey] = new Set();
      if (row.density != null && !Number.isNaN(row.density)) densitiesByKey[densKey].add(Number(row.density));

      const colorKey = row.product_id + '|' + row.material_id + '|' + (row.density == null ? 'nodensity' : row.density);
      if (!colorsByKey[colorKey]) colorsByKey[colorKey] = new Map();
      if (!colorsByKey[colorKey].has(row.color_id) && APP.colorMeta[row.color_id]) {
        colorsByKey[colorKey].set(row.color_id, {
          id: row.color_id,
          label: row.color_label || APP.colorMeta[row.color_id].label || row.color_id,
          ...(APP.colorMeta[row.color_id] || {})
        });
      }
    });

    const orderedColors = obj => Object.fromEntries(
      Object.entries(obj).map(([k, m]) => [
        k,
        APP.colorOrder
          .map(colorId => m.get(colorId))
          .filter(Boolean)
      ])
    );

    return {
      products: Array.from(productsMap.values()),
      materialsByProduct: Object.fromEntries(
        Object.entries(materialsByProduct).map(([k, v]) => [k, Array.from(v.values())])
      ),
      densitiesByKey: Object.fromEntries(
        Object.entries(densitiesByKey).map(([k, v]) => [k, Array.from(v).sort((a,b) => a - b)])
      ),
      colorsByKey: orderedColors(colorsByKey)
    };
  }

  getProducts(){ return this.catalog.products || []; }
  getMaterials(){ return this.catalog.materialsByProduct[this.s.product] || []; }
  getDensities(){ return this.catalog.densitiesByKey[this.s.product + '|' + this.s.material] || []; }

  getColors(){
    const densityKey = this.requiresDensity() ? this.s.density : 'nodensity';
    return this.catalog.colorsByKey[this.s.product + '|' + this.s.material + '|' + densityKey] || [];
  }

  requiresDensity(){
    return this.getDensities().length > 0;
  }

  ensureValidState(){
    const products = this.getProducts();
    if (this.s.product && !products.find(x => x.id === this.s.product)) this.s.product = '';
    if (!this.s.product && products.length) this.s.product = products[0].id;

    const materials = this.getMaterials();
    if (this.s.material && !materials.find(x => x.id === this.s.material)) this.s.material = '';
    if (!this.s.material && materials.length) this.s.material = materials[0].id;

    const densities = this.getDensities();
    if (densities.length) {
      if (this.s.density == null || !densities.includes(Number(this.s.density))) this.s.density = densities[0];
    } else {
      this.s.density = null;
    }

    const colors = this.getColors();
    if (this.s.color && !colors.find(x => x.id === this.s.color)) this.s.color = '';
    if (!this.s.color && colors.length) this.s.color = colors[0].id;

    if (!APP.quantities.includes(Number(this.s.qty))) this.s.qty = APP.quantities[0];
  }

  async loadData(){
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'PASTE_YOUR_EXEC_URL_HERE') {
      this.error = 'Не вставлен APPS_SCRIPT_URL';
      this.render();
      return;
    }

    try {
      const json = await this.loadJsonp(APPS_SCRIPT_URL);
      if (!json) throw new Error('Apps Script ничего не вернул');
      if (!json.ok) throw new Error(json.error || 'Apps Script вернул ok:false');

      const items = this.normalizeItems(json.items || json.data || []);
      if (!items.length) throw new Error('Таблица пустая или в ней нет корректных строк');

      this.rows = items;
      this.catalog = this.buildCatalog(items);
      this.loaded = true;
      this.error = '';
      this.ensureValidState();
      this.render();
    } catch (err) {
      this.loaded = false;
      this.error = 'Не удалось загрузить цены из Google Sheets: ' + (err && err.message ? err.message : String(err));
      this.render();
    }
  }

  findRow(){
    return this.rows.find(row =>
      row.product_id === this.s.product &&
      row.material_id === this.s.material &&
      (row.density == null ? null : Number(row.density)) === (this.s.density == null ? null : Number(this.s.density)) &&
      row.color_id === this.s.color
    ) || null;
  }

  btn(label, active, a, v){
    return `<button type="button" class="btn ${active ? 'active' : ''}" data-a="${a}" data-v="${v}">${label}</button>`;
  }

  colorSwatch(c){
    const active = this.s.color === c.id;
    const cls = c.className ? ` ${c.className}` : '';
    return `<button type="button" class="sw${cls} ${active ? 'active' : ''}" title="${c.label}" aria-label="${c.label}" style="--sw:${c.hex || '#ffffff'}" data-a="color" data-v="${c.id}"></button>`;
  }

  calc(){
    const row = this.findRow();
    const unitPrice = row ? Number(row.unit_price) : 0;
    const total = unitPrice * Number(this.s.qty || 0);
    return { row, unitPrice, total };
  }

  render(){
    this.ensureValidState();

    const products = this.getProducts();
    const materials = this.getMaterials();
    const densities = this.getDensities();
    const colors = this.getColors();

    const c = this.calc();
    const product = products.find(x => x.id === this.s.product);
    const material = materials.find(x => x.id === this.s.material);
    const color = colors.find(x => x.id === this.s.color);
    const showDensity = densities.length > 0;
    const missingPrice = this.loaded && !c.unitPrice;

    this.root.innerHTML = `
      <div class="panel">
        <div class="step">
          <h3>Изделие</h3>
          <div class="seg">${products.map(i => this.btn(i.label, this.s.product === i.id, 'product', i.id)).join('')}</div>
        </div>

        <div class="step ${this.s.product ? '' : 'is-hidden'}">
          <h3>Материал</h3>
          <div class="seg">${materials.map(i => this.btn(i.label, this.s.material === i.id, 'material', i.id)).join('')}</div>
        </div>

        <div class="step ${(this.s.product && this.s.material && showDensity) ? '' : 'is-hidden'}">
          <h3>Плотность</h3>
          <div class="dim-grid">${densities.map(i => this.btn(i + ' г/м²', Number(this.s.density) === Number(i), 'density', i)).join('')}</div>
        </div>

        <div class="step ${(this.s.product && this.s.material && (!showDensity || this.s.density)) ? '' : 'is-hidden'}">
          <h3>Цвет изделия</h3>
          ${!this.loaded ? '<div class="hint">Загружаю цены из Google Sheets...</div>' : `<div class="swatches">${colors.map(c => this.colorSwatch(c)).join('')}</div>`}
        </div>

        <div class="step ${(this.s.product && this.s.material && (!showDensity || this.s.density) && this.s.color) ? '' : 'is-hidden'}">
          <h3>Тираж</h3>
          <div class="seg">${APP.quantities.map(i => this.btn(i + ' шт.', Number(this.s.qty) === Number(i), 'qty', i)).join('')}</div>
        </div>
      </div>

      <div class="sum">
        ${this.error ? `<div class="card hint err">${this.error}</div>` : ''}

        <div class="card">
          <div class="badges">
            ${product ? `<div class="badge">${product.label}</div>` : ''}
            ${material ? `<div class="badge">${material.label}</div>` : ''}
            ${showDensity && this.s.density ? `<div class="badge">${this.s.density} г/м²</div>` : ''}
            ${color ? `<div class="badge">${color.label}</div>` : ''}
            ${this.s.qty ? `<div class="badge">${n0(this.s.qty)} шт.</div>` : ''}
          </div>

          <div class="row">
            <span>Цена за 1 шт.</span>
            <strong>${money(c.unitPrice)}</strong>
          </div>
          <div class="row">
            <span>Тираж</span>
            <strong>${n0(this.s.qty)} шт.</strong>
          </div>

          ${product && product.id === 'longsleeve' ? `<div class="hint">Плотность выбирается только для лонгслива.</div>` : ''}
          ${missingPrice ? `<div class="hint err" style="margin-top:12px">Для выбранных параметров цена не найдена в таблице.</div>` : ''}
        </div>

        <div class="card totalcard">
          <h3>Итоговая стоимость</h3>
          <div class="total">${money(c.total)}</div>
          <div class="note">*Предварительная стоимость. Для точного расчёта уточняйте у менеджера.</div>
        </div>
      </div>
    `;

    this.root.querySelectorAll('[data-a]').forEach(el => el.addEventListener('click', () => {
      const a = el.dataset.a;
      let v = el.dataset.v;
      if (a === 'density' || a === 'qty') v = Number(v);

      if (a === 'product') {
        this.s.product = v;
        this.s.material = '';
        this.s.density = null;
        this.s.color = '';
      }
      if (a === 'material') {
        this.s.material = v;
        this.s.density = null;
        this.s.color = '';
      }
      if (a === 'density') {
        this.s.density = v;
        this.s.color = '';
      }
      if (a === 'color') this.s.color = v;
      if (a === 'qty') this.s.qty = v;

      this.render();
    }));
  }
}

new Calc(document.getElementById('app'));
</script>
</body>
</html>
