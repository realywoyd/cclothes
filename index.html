<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор пошива одежды</title>
<style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:1080px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}
h1{margin:0;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);gap:22px;padding:12px 22px 22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px;min-width:0}
.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.step+.step{margin-top:18px}
.step.is-hidden{display:none}
.step h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.seg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}
.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}

.swatches{display:grid;grid-template-columns:repeat(auto-fit,52px);gap:12px}
.sw{width:52px;height:52px;border-radius:50%;border:2px solid #d7d7d7;cursor:pointer;background:var(--sw);transition:.18s ease}
.sw.white{box-shadow:inset 0 0 0 1px #d8d8d8}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.14)}

.sum{display:grid;gap:14px;min-width:0}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}
.row:last-child{border-bottom:none;padding-bottom:0}
.row strong{color:#191919}
.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}
.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
.hint{margin-top:10px;padding:10px 12px;border-radius:12px;background:#f3f8f4;font-size:13px;color:#35523f;border:1px solid #dce9df}
.err{background:#fff2f0;border-color:#efc5bf;color:#7d2d25}
.note-red{margin-top:8px;font-size:12px;color:#d13b3b;line-height:1.35}

@media (max-width:980px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
@media (max-width:560px){
  body{padding:10px 8px}
  .wrap{border-radius:22px}
  .head{padding:18px 14px 10px}
  h1{font-size:24px}
  .grid{padding:10px;gap:10px}
  .panel,.card{padding:14px;border-radius:18px}
  .seg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .btn{min-height:46px;padding:8px;font-size:13px;border-radius:12px}
  .swatches{grid-template-columns:repeat(4,52px);gap:10px}
  .sw{width:48px;height:48px}
  .badge{font-size:12px;padding:7px 10px}
  .row,.hint,.note-red{font-size:12px}
  .total{font-size:28px}
}
</style>
</head>
<body>
<section class="wrap">
  <div class="head"><h1>Калькулятор пошива одежды</h1></div>
  <div class="grid" id="app"></div>
</section>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJcpglupkHwebe22RDdzonCzT8AvizG6cPUwkUSnj3c6O5rNNPPVSuYBw6bv9lC5ulUA/exec';

const APP = {
  models:[
    {id:'hoodie',label:'Худи'},
    {id:'sweatshirt',label:'Толстовка'},
    {id:'longsleeve',label:'Лонгслив'}
  ],
  genders:[
    {id:'male',label:'Мужской'},
    {id:'female',label:'Женский'}
  ],
  materialsByModel:{
    hoodie:[
      {id:'cotton',label:'100% хлопок'},
      {id:'mix',label:'80/20'}
    ],
    sweatshirt:[
      {id:'cotton',label:'100% хлопок'},
      {id:'mix',label:'80/20'}
    ],
    longsleeve:[
      {id:'cotton',label:'100% хлопок'},
      {id:'mix',label:'92/8'}
    ]
  },
  colors:[
    {id:'white',label:'Белый',hex:'#ffffff',className:'white'},
    {id:'black',label:'Чёрный',hex:'#111111'},
    {id:'blue',label:'Синий',hex:'#295bc8'},
    {id:'red',label:'Красный',hex:'#d64242'}
  ],
  qty:[50,100,200,300,500,1000]
};

const money = v => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(Number(v || 0))) + ' руб.';
const n0 = v => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Number(v || 0));

class Calc{
  constructor(root){
    this.root = root;
    this.error = '';
    this.loaded = false;
    this.rows = [];
    this.s = {model:'hoodie', gender:'male', material:'cotton', density:null, color:'white', qty:50};
    this.render();
    this.init();
  }

  loadJsonp(url){
    return new Promise((resolve, reject) => {
      const cb = '__clothesSewingCb_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const sep = url.includes('?') ? '&' : '?';
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('Таймаут загрузки данных'));
      }, 20000);

      function cleanup(){
        clearTimeout(timeout);
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      }

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('Ошибка загрузки скрипта'));
      };

      script.src = url + sep + 'callback=' + encodeURIComponent(cb);
      document.body.appendChild(script);
    });
  }

  normalizeItems(raw){
    const arr = Array.isArray(raw) ? raw : [];
    return arr.map(r => ({
      model_id: String(r.model_id || '').trim(),
      gender_id: String(r.gender_id || '').trim(),
      material_id: String(r.material_id || '').trim(),
      density: (r.density === '' || r.density == null) ? '' : Number(r.density),
      color_id: String(r.color_id || '').trim(),
      unit_price: Number(r.unit_price || 0)
    })).filter(r => r.model_id && r.gender_id && r.material_id && r.unit_price > 0);
  }

  async init(){
    try{
      const json = await this.loadJsonp(APPS_SCRIPT_URL);
      if (!json || !json.ok) throw new Error((json && json.error) || 'Apps Script вернул ошибку');

      const source = json.data && Array.isArray(json.data.rows) ? json.data.rows
                   : Array.isArray(json.data) ? json.data
                   : Array.isArray(json.items) ? json.items
                   : [];

      this.rows = this.normalizeItems(source);
      if (!this.rows.length) throw new Error('Таблица пустая или данные не распознаны');

      this.loaded = true;
      this.error = '';
      this.ensureValidState();
      this.render();
    }catch(e){
      this.loaded = false;
      this.error = 'Не удалось загрузить данные из Google Sheets: ' + (e && e.message ? e.message : String(e));
      this.render();
    }
  }

  getMaterials(){
    return APP.materialsByModel[this.s.model] || [];
  }

  getDensities(){
    if (this.s.model !== 'longsleeve') return [];
    const vals = this.rows
      .filter(r => r.model_id === this.s.model && r.gender_id === this.s.gender && r.material_id === this.s.material && r.density !== '')
      .map(r => Number(r.density));
    return Array.from(new Set(vals)).sort((a,b) => a - b);
  }

  ensureValidState(){
    if (!APP.models.find(x => x.id === this.s.model)) this.s.model = APP.models[0].id;
    if (!APP.genders.find(x => x.id === this.s.gender)) this.s.gender = APP.genders[0].id;

    const materials = this.getMaterials();
    if (!materials.find(x => x.id === this.s.material)) this.s.material = materials[0]?.id || '';

    const densities = this.getDensities();
    if (this.s.model === 'longsleeve') {
      if (!densities.includes(Number(this.s.density))) this.s.density = densities[0] || 240;
    } else {
      this.s.density = null;
    }

    if (!APP.colors.find(x => x.id === this.s.color)) this.s.color = APP.colors[0].id;
    if (!APP.qty.includes(Number(this.s.qty))) this.s.qty = APP.qty[0];
  }

  findRow(){
    return this.rows.find(r =>
      r.model_id === this.s.model &&
      r.gender_id === this.s.gender &&
      r.material_id === this.s.material &&
      (this.s.model !== 'longsleeve' || Number(r.density) === Number(this.s.density))
    ) || null;
  }

  btn(label, active, a, v){
    return `<button type="button" class="btn ${active ? 'active' : ''}" data-a="${a}" data-v="${v}">${label}</button>`;
  }

  colorSwatch(c){
    const active = this.s.color === c.id;
    const cls = c.className ? ` ${c.className}` : '';
    return `<button type="button" class="sw${cls} ${active ? 'active' : ''}" title="${c.label}" aria-label="${c.label}" style="--sw:${c.hex}" data-a="color" data-v="${c.id}"></button>`;
  }

  getDiscountPerUnit(){
    const map = {
      50: 100,
      100: 200,
      200: 300,
      300: 400,
      500: 500,
      1000: 600
    };
    return map[Number(this.s.qty)] || 0;
  }

  calc(){
    const row = this.findRow();
    const unitPrice = row ? Number(row.unit_price) : 0;
    const discountPerUnit = this.getDiscountPerUnit();
    const finalUnitPrice = Math.max(0, unitPrice - discountPerUnit);
    const totalDiscount = discountPerUnit * Number(this.s.qty || 0);
    const total = finalUnitPrice * Number(this.s.qty || 0);

    return {unitPrice, discountPerUnit, finalUnitPrice, totalDiscount, total};
  }

  render(){
    this.ensureValidState();
    const materials = this.getMaterials();
    const densities = this.getDensities();
    const c = this.calc();

    this.root.innerHTML = `
      <div class="panel">
        <div class="step">
          <h3>Модель</h3>
          <div class="seg">${APP.models.map(i => this.btn(i.label, this.s.model === i.id, 'model', i.id)).join('')}</div>
        </div>

        <div class="step">
          <h3>Пол</h3>
          <div class="seg">${APP.genders.map(i => this.btn(i.label, this.s.gender === i.id, 'gender', i.id)).join('')}</div>
        </div>

        <div class="step">
          <h3>Материал</h3>
          <div class="seg">${materials.map(i => this.btn(i.label, this.s.material === i.id, 'material', i.id)).join('')}</div>
        </div>

        <div class="step ${this.s.model === 'longsleeve' ? '' : 'is-hidden'}">
          <h3>Плотность</h3>
          <div class="seg">${densities.map(i => this.btn(i + ' г/м²', Number(this.s.density) === Number(i), 'density', i)).join('')}</div>
        </div>

        <div class="step">
          <h3>Цвет</h3>
          <div class="swatches">${APP.colors.map(i => this.colorSwatch(i)).join('')}</div>
          <div class="note-red">*Возможен пошив в других цветах — уточняйте у менеджера.</div>
        </div>

        <div class="step">
          <h3>Тираж</h3>
          <div class="seg">${APP.qty.map(i => this.btn(i + ' шт.', Number(this.s.qty) === Number(i), 'qty', i)).join('')}</div>
        </div>
      </div>

      <div class="sum">
        ${this.error ? `<div class="card hint err">${this.error}</div>` : ''}

        <div class="card">
          <div class="badges">
            <div class="badge">${APP.models.find(x => x.id === this.s.model)?.label || ''}</div>
            <div class="badge">${APP.genders.find(x => x.id === this.s.gender)?.label || ''}</div>
            <div class="badge">${materials.find(x => x.id === this.s.material)?.label || ''}</div>
            ${this.s.model === 'longsleeve' && this.s.density ? `<div class="badge">${this.s.density} г/м²</div>` : ''}
            <div class="badge">${APP.colors.find(x => x.id === this.s.color)?.label || ''}</div>
            <div class="badge">${n0(this.s.qty)} шт.</div>
          </div>

          <div class="row">
            <span>Цена за 1 шт.</span>
            <strong>${money(c.unitPrice)}</strong>
          </div>
          <div class="row">
            <span>Скидка за 1 шт.</span>
            <strong>- ${money(c.discountPerUnit)}</strong>
          </div>
          <div class="row">
            <span>Цена за 1 шт. со скидкой</span>
            <strong>${money(c.finalUnitPrice)}</strong>
          </div>
          <div class="row">
            <span>Тираж</span>
            <strong>${n0(this.s.qty)} шт.</strong>
          </div>
          <div class="row">
            <span>Общая скидка</span>
            <strong>- ${money(c.totalDiscount)}</strong>
          </div>
          ${this.loaded && !c.unitPrice ? `<div class="hint err" style="margin-top:12px">Для выбранных параметров цена не найдена в таблице.</div>` : ''}
        </div>

        <div class="card totalcard">
          <h3>Итоговая стоимость</h3>
          <div class="total">${money(c.total)}</div>
          <div class="note-red">*Предварительная стоимость. Для точного расчёта уточняйте у менеджера.</div>
        </div>
      </div>
    `;

    this.root.querySelectorAll('[data-a]').forEach(el => el.addEventListener('click', () => {
      const a = el.dataset.a;
      let v = el.dataset.v;
      if (a === 'density' || a === 'qty') v = Number(v);

      if (a === 'model') {
        this.s.model = v;
        this.s.material = '';
        this.s.density = null;
      }
      if (a === 'gender') {
        this.s.gender = v;
        this.s.density = null;
      }
      if (a === 'material') {
        this.s.material = v;
        this.s.density = null;
      }
      if (a === 'density') this.s.density = v;
      if (a === 'color') this.s.color = v;
      if (a === 'qty') this.s.qty = v;

      this.render();
    }));
  }
}

new Calc(document.getElementById('app'));
</script>
</body>
</html>
